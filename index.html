<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>受付</title>

<script src="shared.js?v=20260501-1"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; padding: 10px; }

.day-btn{
font-size:24px;
padding:14px 20px;
margin:6px 4px;
opacity:0.6;
}

.day-btn.today{
opacity:1;
background:#66adff;
color:#fff;
font-weight:bold;
}

.class-btn{
font-size:32px;
padding:60px 28px;
margin:18px 0;
width:100%;
text-align:left;
}

.remain-btn{
font-size:28px;
padding:26px 20px;
margin:16px 0;
width:100%;
background:#ffd966;
color:#000;
font-weight:bold;
border:none;
border-radius:10px;
}

#complete{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#completeBox{
background:#fff;
padding:44px 20px;
border-radius:18px;
text-align:center;
width:98%;
max-width:560px;
box-sizing:border-box;
line-height:1.6;
}

#completeDetail{
font-size:28px;
font-weight:700;
}

#completeDetail b{
font-size:36px;
}

.complete-title{
font-size:48px;
font-weight:800;
display:block;
}
</style>
</head>

<body>

<h2 id="title"></h2>

<button id="remainBtn" class="remain-btn">
受講数照会
</button>

<div id="dayButtons"></div>
<div id="container"></div>

<div id="complete">
  <div id="completeBox">
    <div id="completeDetail"></div>
  </div>
</div>

<script>
(async () => {

  await initLiffSafe();

  const title = document.getElementById("title");
  const container = document.getElementById("container");
  const dayButtons = document.getElementById("dayButtons");
  const complete = document.getElementById("complete");
  const completeDetail = document.getElementById("completeDetail");
  const remainBtn = document.getElementById("remainBtn");

  let selectedDay = getTokyoWeekdayLabel();
  if(selectedDay === "日") selectedDay = "月";

  let submitting = false;
  const cleanBaseUrl = location.origin + location.pathname;

  function getMemberFromUrl(){
    let m = "";

    try{
      const params = new URLSearchParams(window.location.search);
      m = params.get("member") || "";
    }catch(e){}

    if(!m){
      try{
        const url = new URL(location.href);
        m = url.searchParams.get("member") || "";
      }catch(e){}
    }

    return normalizeMember(m || "");
  }

  function setCurrentMember(value){
    const m = normalizeMember(value || "");
    window.currentMember = m;
    return m;
  }

  let firstMember = getMemberFromUrl();

  if(!firstMember && typeof liff !== "undefined"){
    try{
      if(liff.isInClient()){
        const ctx = liff.getContext();
        if(ctx && ctx.queryParams && ctx.queryParams.member){
          firstMember = normalizeMember(ctx.queryParams.member);
        }
      }
    }catch(e){
      console.log("LIFF context error", e);
    }
  }

  setCurrentMember(firstMember);

  window.openScanner = function(){
    if(typeof liff !== "undefined" && liff.isInClient()){
      liff.scanCodeV2()
        .then(result => {
          if(result && result.value){
            let scannedMember = "";

            try{
              const scannedUrl = new URL(result.value);
              scannedMember = scannedUrl.searchParams.get("member") || "";
            }catch(e){
              scannedMember = result.value || "";
            }

            scannedMember = normalizeMember(scannedMember);

            if(scannedMember){
              setCurrentMember(scannedMember);

              if(typeof clearDuplicateCache === "function"){
                clearDuplicateCache(scannedMember);
              }

              renderAll();

              completeDetail.innerHTML =
                "<span class='complete-title'>✅ 読み取り完了</span><br><br>" +
                "会員番号：<b>" + escapeHtml(scannedMember) + "</b><br><br>" +
                "<span>クラスを選択してください</span>";

              complete.style.display = "flex";

              setTimeout(() => {
                complete.style.display = "none";
              }, 700);
            }else{
              alert("QRから会員番号を取得できませんでした");
            }
          }
        })
        .catch(err => {
          console.log("scan error", err);
        });
    }else{
      location.replace(cleanBaseUrl);
    }
  };

  remainBtn.onclick = async () => {
    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      return;
    }

    try{
      showLoading();
      const data = await fetchCount(currentMember);
      showCount(data);
    }catch(e){
      alert("照会エラー");
      console.log("remainBtn error", e);
    }
  };

  async function submit(classNames){

    if(submitting) return;

    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      return;
    }

    const classes = (Array.isArray(classNames) ? classNames : [classNames])
      .map(c => String(c || "").trim())
      .filter(c => c);

    if(classes.length === 0){
      alert("クラスを選択してください");
      return;
    }

    submitting = true;

    completeDetail.innerHTML =
      "<span class='complete-title'>✅ 受付完了</span><br><br>" +
      "会員番号：<b>" + escapeHtml(currentMember) + "</b><br>" +
      "クラス：<b>" + classes.map(c => escapeHtml(c)).join("<br>") + "</b>";

    complete.style.display = "flex";

    try{
      const requests = classes.map(className => {
        const url =
          APP_CONFIG.FORM_RESPONSE +
          "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(currentMember) +
          "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

        return fetch(url, { method:"POST", mode:"no-cors" });
      });

      await Promise.all(requests);

      if(typeof clearDuplicateCache === "function"){
        clearDuplicateCache(currentMember);
      }

      setTimeout(() => {
        complete.style.display = "none";
        submitting = false;
        openScanner();
      }, 1200);

    }catch(e){
      console.log("submit error", e);
      alert("送信エラー");
      submitting = false;
      complete.style.display = "none";
    }
  }

  function renderAll(){
    renderDayButtons({
      dayButtonsEl: dayButtons,
      selectedDay,
      onSelect: (day) => {
        selectedDay = day;
        renderAll();
      }
    });

    renderClasses({
      day: selectedDay,
      titleEl: title,
      containerEl: container,
      onSubmit: submit
    });
  }

  renderAll();

})();
</script>
</body>
</html>
