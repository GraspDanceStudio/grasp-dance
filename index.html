<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>受付</title>

<script src="shared.js?v=20260616-2"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
* {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  margin: 0;
  padding: 12px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f4f6f8;
  color: #222;
}

/* iPhone/Android/PCの標準ボタン見た目をリセット */
button,
input,
select,
textarea {
  font: inherit;
}

button {
  appearance: none;
  -webkit-appearance: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

h2#title {
  margin: 10px 0 12px;
  font-size: 28px;
  line-height: 1.3;
  font-weight: 800;
}

/* 受講数照会 */
.remain-btn {
  width: 100%;
  min-height: 58px;
  font-size: 24px;
  line-height: 1.2;
  padding: 16px 18px;
  margin: 10px 0 14px;
  background: #ffd966;
  color: #111;
  font-weight: 800;
  border: 2px solid #e0b800;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.16);
}

.remain-btn:active {
  transform: translateY(1px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
}

/* 曜日ボタンエリア */
#dayButtons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 10px 0 14px;
}

/* 曜日ボタン */
.day-btn {
  min-height: 48px;
  font-size: 18px;
  line-height: 1.1;
  padding: 10px 6px;
  margin: 0;
  border-radius: 999px;
  background: #ffffff;
  color: #333;
  font-weight: 800;
  border: 1px solid #cfd7e2;
  box-shadow: 0 2px 6px rgba(0,0,0,0.10);
  opacity: 1;
}

.day-btn.today {
  background: #1f6feb;
  color: #fff;
  border-color: #1f6feb;
  box-shadow: 0 4px 10px rgba(31,111,235,0.28);
}

.day-btn:active {
  transform: translateY(1px);
}

/* クラスボタンを並べるエリア */
#container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  padding-bottom: 24px;
}

/* クラスボタン */
.class-btn {
  width: 100%;
  min-height: 132px;
  font-size: 30px;
  line-height: 1.25;
  padding: 38px 24px;
  margin: 0;
  text-align: left;
  border-radius: 20px;
  background: #ffffff;
  color: #111;
  font-weight: 850;
  border: 2px solid #d0d7de;
  box-shadow: 0 5px 14px rgba(0,0,0,0.14);
}

.class-btn:active {
  transform: translateY(1px);
  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
}

.class-btn:disabled,
.day-btn:disabled,
.remain-btn:disabled {
  background: #c8ced8;
  color: #fff;
  border-color: #c8ced8;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

/* shared.js側で受付済み/選択済みクラスが付く可能性用 */
.class-btn.done,
.class-btn.received,
.class-btn.accepted,
.class-btn.duplicate {
  background: #e9ecef;
  color: #666;
  border-color: #d0d7de;
  box-shadow: none;
}

/* 完了オーバーレイ */
#complete {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 14px;
}

#completeBox {
  background: #fff;
  padding: 44px 20px;
  border-radius: 22px;
  text-align: center;
  width: 100%;
  max-width: 560px;
  box-sizing: border-box;
  line-height: 1.6;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}

#completeDetail {
  font-size: 26px;
  font-weight: 700;
}

#completeDetail b {
  font-size: 34px;
}

.complete-title {
  font-size: 44px;
  font-weight: 900;
  display: block;
}

/* 小さめ端末調整 */
@media (max-width: 380px) {
  .class-btn {
    font-size: 26px;
    min-height: 118px;
    padding: 34px 20px;
  }
}

  h2#title {
    font-size: 24px;
  }

  .remain-btn {
    font-size: 22px;
  }

  .day-btn {
    font-size: 16px;
    min-height: 44px;
  }

  .class-btn {
    font-size: 24px;
    min-height: 88px;
    padding: 24px 18px;
  }

  .complete-title {
    font-size: 38px;
  }

  #completeDetail {
    font-size: 24px;
  }

  #completeDetail b {
    font-size: 30px;
  }
}
</style>
</head>

<body>

<h2 id="title"></h2>

<button id="remainBtn" class="remain-btn">
受講数照会
</button>

<div id="dayButtons"></div>
<div id="container"></div>

<div id="complete">
  <div id="completeBox">
    <div id="completeDetail"></div>
  </div>
</div>

<script>
(async () => {

  await initLiffSafe();

  const title = document.getElementById("title");
  const container = document.getElementById("container");
  const dayButtons = document.getElementById("dayButtons");
  const complete = document.getElementById("complete");
  const completeDetail = document.getElementById("completeDetail");
  const remainBtn = document.getElementById("remainBtn");

  let selectedDay = getTokyoWeekdayLabel();
  if(selectedDay === "日") selectedDay = "月";

  let submitting = false;
  const cleanBaseUrl = location.origin + location.pathname;

  function getMemberFromUrl(){
    let m = "";

    try{
      const params = new URLSearchParams(window.location.search);
      m = params.get("member") || "";
    }catch(e){}

    if(!m){
      try{
        const url = new URL(location.href);
        m = url.searchParams.get("member") || "";
      }catch(e){}
    }

    return normalizeMember(m || "");
  }

  function setCurrentMember(value){
    const m = normalizeMember(value || "");
    window.currentMember = m;
    return m;
  }

  let firstMember = getMemberFromUrl();

  if(!firstMember && typeof liff !== "undefined"){
    try{
      if(liff.isInClient()){
        const ctx = liff.getContext();
        if(ctx && ctx.queryParams && ctx.queryParams.member){
          firstMember = normalizeMember(ctx.queryParams.member);
        }
      }
    }catch(e){
      console.log("LIFF context error", e);
    }
  }

  setCurrentMember(firstMember);

  window.openScanner = function(){
    if(typeof liff !== "undefined" && liff.isInClient()){
      liff.scanCodeV2()
        .then(result => {
          if(result && result.value){
            let scannedMember = "";

            try{
              const scannedUrl = new URL(result.value);
              scannedMember = scannedUrl.searchParams.get("member") || "";
            }catch(e){
              scannedMember = result.value || "";
            }

            scannedMember = normalizeMember(scannedMember);

            if(scannedMember){
              setCurrentMember(scannedMember);

              if(typeof clearDuplicateCache === "function"){
                clearDuplicateCache(scannedMember);
              }

              renderAll();

              completeDetail.innerHTML =
                "<span class='complete-title'>✅ 読み取り完了</span><br><br>" +
                "会員番号：<b>" + escapeHtml(scannedMember) + "</b><br><br>" +
                "<span>クラスを選択してください</span>";

              complete.style.display = "flex";

              setTimeout(() => {
                complete.style.display = "none";
              }, 700);
            }else{
              alert("QRから会員番号を取得できませんでした");
            }
          }
        })
        .catch(err => {
          console.log("scan error", err);
        });
    }else{
      location.replace(cleanBaseUrl);
    }
  };

  remainBtn.onclick = async () => {
    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      return;
    }

    try{
      showLoading();
      const data = await fetchCount(currentMember);
      showCount(data);
    }catch(e){
      alert("照会エラー");
      console.log("remainBtn error", e);
    }
  };

  async function submit(classNames){

    if(submitting) return;

    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      return;
    }

    const classes = (Array.isArray(classNames) ? classNames : [classNames])
      .map(c => String(c || "").trim())
      .filter(c => c);

    if(classes.length === 0){
      alert("クラスを選択してください");
      return;
    }

    submitting = true;

    try{
      if(typeof getTodayDuplicateClasses === "function"){
        const duplicates = await getTodayDuplicateClasses(currentMember, classes, true);

        if(duplicates.length > 0){
          alert(
            "すでに受付済みのクラスがあります。\n\n" +
            duplicates.map(c => "・" + c).join("\n")
          );

          submitting = false;
          return;
        }
      }
    }catch(e){
      console.log("final duplicate check error", e);
      alert("重複確認ができませんでした。通信状態を確認して、もう一度受付してください。");
      submitting = false;
      return;
    }

    completeDetail.innerHTML =
      "<span class='complete-title'>✅ 受付完了</span><br><br>" +
      "会員番号：<b>" + escapeHtml(currentMember) + "</b><br>" +
      "クラス：<b>" + classes.map(c => escapeHtml(c)).join("<br>") + "</b>";

    complete.style.display = "flex";

    try{
      const requests = classes.map(className => {
        const url =
          APP_CONFIG.FORM_RESPONSE +
          "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(currentMember) +
          "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

        return fetch(url, { method:"POST", mode:"no-cors" });
      });

      await Promise.all(requests);

      if(typeof addLocalPendingDuplicateClasses === "function"){
        addLocalPendingDuplicateClasses(currentMember, classes);
      }

      if(typeof clearDuplicateCache === "function"){
        clearDuplicateCache(currentMember);
      }

      setTimeout(() => {
        complete.style.display = "none";
        submitting = false;
        openScanner();
      }, 1200);

    }catch(e){
      console.log("submit error", e);
      alert("送信エラー");
      submitting = false;
      complete.style.display = "none";
    }
  }

  function renderAll(){
    renderDayButtons({
      dayButtonsEl: dayButtons,
      selectedDay,
      onSelect: (day) => {
        selectedDay = day;
        renderAll();
      }
    });

    renderClasses({
      day: selectedDay,
      titleEl: title,
      containerEl: container,
      onSubmit: submit
    });
  }

  renderAll();

})();
</script>
</body>
</html>
