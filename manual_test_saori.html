<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>受付（固定クラス：SAORI / 完全自動）</title>

<script src="./shared.js?v=20260418-8"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; padding: 12px; }

.input-box { margin: 10px 0 14px; }
input[type="text"]{
  font-size: 28px;
  padding: 18px;
  width: 100%;
  box-sizing: border-box;
}

.class-btn {
  font-size: 32px;
  padding: 60px 28px;
  margin: 18px 0;
  width: 100%;
  text-align: center;
}

#complete {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
#completeBox {
  background: #fff;
  padding: 44px 34px;
  border-radius: 18px;
  text-align: center;
  width: 92%;
  max-width: 560px;
  box-sizing: border-box;
}
#completeBox .done {
  font-size: 44px;
  font-weight: 800;
  margin-bottom: 12px;
}
#completeBox .detail {
  font-size: 24px;
  line-height: 1.6;
}

.status-box{
  font-size: 26px;
  font-weight: 700;
  margin: 10px 0 16px;
  line-height: 1.6;
}

.title-main{
  font-size: 34px;
  font-weight: 800;
  margin-bottom: 10px;
}

.title-sub{
  font-size: 24px;
  color: #444;
  margin-bottom: 14px;
}
</style>
</head>

<body>
<div class="title-main">SAORI受付</div>
<div class="title-sub">QRを読み取るか、会員番号 / URLを入力してください</div>

<div class="input-box">
  <input id="memberInput" type="text" placeholder="会員番号 または QRのURL" autocomplete="off" autocapitalize="off" />
</div>

<div id="statusBox" class="status-box">待機中</div>

<button id="goBtn" class="class-btn" style="display:none;">
  受付する
</button>

<div id="complete">
  <div id="completeBox">
    <div class="done">✅ 受付完了</div>
    <div class="detail" id="completeDetail"></div>
  </div>
</div>

<script>
const FIXED_CLASS = "SAORI";

const memberInput = document.getElementById("memberInput");
const goBtn = document.getElementById("goBtn");
const complete = document.getElementById("complete");
const completeDetail = document.getElementById("completeDetail");
const statusBox = document.getElementById("statusBox");

let currentMember = "";
let submitting = false;
let lastAutoSubmittedValue = "";
let resetTimer = null;

// URL対応つき安全版
function normalizeMemberSafe(v){
  try{
    if(typeof normalizeMember === "function"){
      return normalizeMember(v);
    }
  }catch(e){}

  let s = String(v || "").trim();

  try{
    if(/^https?:/i.test(s)){
      const u = new URL(s);
      s = u.searchParams.get("member") || s;
    }
  }catch(e){}

  try{
    s = decodeURIComponent(s);
  }catch(e){}

  s = s.split("?")[0].trim();

  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
  );

  s = s.replace(/[^A-Za-z0-9\-_]/g, "");
  s = s.toUpperCase();

  return s;
}

function escapeHtmlSafe(v){
  try{
    if(typeof escapeHtml === "function"){
      return escapeHtml(v);
    }
  }catch(e){}
  return String(v || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function setStatus(text){
  statusBox.textContent = text;
}

function focusInput(){
  setTimeout(() => memberInput.focus(), 50);
}

function resetForm(){
  if(resetTimer){
    clearTimeout(resetTimer);
    resetTimer = null;
  }

  currentMember = "";
  window.currentMember = "";
  submitting = false;
  lastAutoSubmittedValue = "";
  memberInput.value = "";
  setStatus("待機中");
  focusInput();
}

async function submit(classNames){

  if(submitting) return;
  submitting = true;

  const member = normalizeMemberSafe(window.currentMember);
  const classes = Array.isArray(classNames) ? classNames : [classNames];

  if(!member){
    setStatus("会員番号が取得できません");
    submitting = false;
    focusInput();
    return;
  }

  try{
    const requests = classes.map(className => {
      const url =
        APP_CONFIG.FORM_RESPONSE +
        "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(member) +
        "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

      return fetch(url, { method: "POST", mode: "no-cors" })
        .catch(e => console.log("submit fetch error", e));
    });

    await Promise.all(requests);

    completeDetail.innerHTML =
      "会員番号：<b>" + escapeHtmlSafe(member) + "</b><br>" +
      "クラス：<b>" + classes.map(c => escapeHtmlSafe(c)).join("<br>") + "</b><br><br>" +
      "次の会員を読み取ってください";

    complete.style.display = "flex";
    setStatus("受付完了");

    resetTimer = setTimeout(() => {
      complete.style.display = "none";
      resetForm();
    }, 1200);

  }catch(e){
    console.log("submit error", e);
    alert("送信エラー");
    setStatus("送信エラー");
    submitting = false;
    focusInput();
  }
}

async function handleAutoReception(rawValue){
  const normalized = normalizeMemberSafe(rawValue);

  if(!normalized) return;
  if(submitting) return;
  if(normalized === lastAutoSubmittedValue) return;

  currentMember = normalized;
  window.currentMember = normalized;

  setStatus("受付済み確認中…");

  try{
    const duplicate = await checkDuplicate(normalized, FIXED_CLASS);

    if(duplicate){
      setStatus("本日受付済み");
      alert(
        "この会員は本日すでに受付済みです。\n\n" +
        "会員番号： " + normalized + "\n" +
        "クラス： " + FIXED_CLASS
      );

      lastAutoSubmittedValue = normalized;

      resetTimer = setTimeout(() => {
        resetForm();
      }, 800);

      return;
    }

    lastAutoSubmittedValue = normalized;
    setStatus("送信中…");
    await submit([FIXED_CLASS]);

  }catch(e){
    console.log("handleAutoReception error", e);
    alert("受付処理エラー");
    setStatus("受付処理エラー");
    submitting = false;
    focusInput();
  }
}

// 入力中は全角を半角へ寄せるだけにして、URLは壊さない
memberInput.addEventListener("input", async () => {
  let v = memberInput.value;

  v = v.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );

  memberInput.value = v;

  // 何か入ったら自動処理
  // URLでも番号でも normalizeMemberSafe が吸収
  await handleAutoReception(v);
});

// 念のため Enter 手動にも対応
memberInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await handleAutoReception(memberInput.value);
  }
});

// 隠しボタン（デバッグ・手動用）
goBtn.onclick = async () => {
  await handleAutoReception(memberInput.value);
};

(async () => {
  try{
    await initLiffSafe();
  }catch(e){}
  resetForm();
})();
</script>

</body>
</html>
