<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>受付</title>

<script src="shared.js?v=20260418-8"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; padding: 10px; }

.class-btn{
font-size:32px;
padding:46px 24px;
margin:14px 0;
width:100%;
text-align:left;
border:none;
border-radius:12px;
background:#f5f5f5;
font-weight:700;
}

.class-btn:disabled{
background:#d9d9d9;
color:#666;
}

.remain-btn{
font-size:28px;
padding:26px 20px;
margin:16px 0;
width:100%;
background:#ffd966;
color:#000;
font-weight:bold;
border:none;
border-radius:10px;
}

.current-box{
font-size:30px;
font-weight:800;
margin:8px 0 14px;
line-height:1.5;
}

.info-box{
font-size:22px;
margin:0 0 14px;
line-height:1.6;
}

#complete{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#completeBox{
background:#fff;
padding:44px 20px;
border-radius:18px;
text-align:center;
width:98%;
max-width:560px;
box-sizing:border-box;
line-height:1.6;
}

#completeDetail{
font-size:28px;
font-weight:700;
}

#completeDetail b{
font-size:36px;
}

.complete-title{
font-size:48px;
font-weight:800;
display:block;
}
</style>
</head>

<body>

<h2 id="title"></h2>

<div id="currentBox" class="current-box"></div>

<button id="remainBtn" class="remain-btn">
受講数照会
</button>

<div id="infoBox" class="info-box"></div>
<div id="container"></div>

<div id="complete">
  <div id="completeBox">
    <div id="completeDetail"></div>
  </div>
</div>

<script>
(async () => {

  await initLiffSafe();

  // ===== クラス一覧（曜日なしで全部表示） =====
  const CLASS_LIST = [
    "UCCHY初級",
    "UCCHY中級",
    "SHINYA",
    "あすぴ",
    "K×G中村キッズ",
    "K×G中村オープン",
    "K×G長久手",
    "SHO-TA",
    "KIBE初級",
    "KIBE中級",
    "MIZUKI",
    "K×G茶屋ヶ坂",
    "AIRI初級",
    "AIRI中級",
    "ruchica",
    "K×G高針キッズ",
    "K×G高針オープン",
    "SERINAキッズ",
    "SERINA初中級",
    "Shogo",
    "RIN",
    "心",
    "K×G瀬戸",
    "manaキッズ",
    "mana初級",
    "KANAMI",
    "RYUYA",
    "SAMURAI",
    "幼児",
    "nikoキッズ",
    "SAORI",
    "TAKUEI",
    "愛梨",
    "MAHIRO初級",
    "MAHIRO中級",
    "WS_4/11Cocona練習会",
    "WS_4/18Konoka練習会",
    "WS_4/25Rena練習会"
  ];

  let member = null;

  const params = new URLSearchParams(window.location.search);
  member = params.get("member");

  if(member){
    member = normalizeMember(member);
  }

  if(!member){
    const url = new URL(location.href);
    member = url.searchParams.get("member");

    if(member){
      member = normalizeMember(member);
    }
  }

  if(!member && typeof liff !== "undefined"){
    try{
      if(liff.isInClient()){
        const ctx = liff.getContext();
        if(ctx && ctx.queryParams && ctx.queryParams.member){
          member = normalizeMember(ctx.queryParams.member);
        }
      }
    }catch(e){
      console.log("LIFF context error", e);
    }
  }

  window.currentMember = normalizeMember(member || "");

  const title = document.getElementById("title");
  const currentBox = document.getElementById("currentBox");
  const container = document.getElementById("container");
  const complete = document.getElementById("complete");
  const completeDetail = document.getElementById("completeDetail");
  const infoBox = document.getElementById("infoBox");

  let submitting = false;
  const cleanBaseUrl = location.origin + location.pathname;

  function renderHeader(){
    const currentMember = normalizeMember(window.currentMember);

    title.textContent = "受付";
    currentBox.innerHTML =
      "会員番号：<b>" + escapeHtml(currentMember || "未読取") + "</b><br>" +
      "<span style='font-size:24px;font-weight:700;'>クラスを選択してください</span>";
  }

  /* =====================
     QR再読取
  ===================== */

  window.openScanner = function(){
    if(typeof liff !== "undefined" && liff.isInClient()){
      liff.scanCodeV2()
        .then(result => {
          if(result && result.value){
            try{
              const scannedUrl = new URL(result.value);
              let scannedMember = scannedUrl.searchParams.get("member");

              if(scannedMember){
                scannedMember = normalizeMember(scannedMember);
                window.currentMember = scannedMember;

                renderAll();

                completeDetail.innerHTML =
                  "<span class='complete-title'>✅ 読み取り完了</span><br><br>" +
                  "会員番号：<b>" + escapeHtml(scannedMember) + "</b><br><br>" +
                  "<span>クラスを選択してください</span>";

                complete.style.display = "flex";

                setTimeout(() => {
                  complete.style.display = "none";
                }, 700);
              }else{
                alert("QRから会員番号を取得できませんでした");
              }
            }catch(e){
              console.log("scan parse error", e);
              alert("QRの読み取り結果を解析できませんでした");
            }
          }
        })
        .catch(err => {
          console.log("scan error", err);
        });
    }else{
      location.replace(cleanBaseUrl);
    }
  };

  /* =====================
     受講数照会
  ===================== */

  document.getElementById("remainBtn").onclick = async () => {
    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      return;
    }

    try{
      showLoading();
      const data = await fetchCount(currentMember);
      showCount(data);
    }catch(e){
      alert("照会エラー");
      console.log("remainBtn error", e);
    }
  };

  /* =====================
     受付処理
  ===================== */

  async function submit(className){

    if(submitting) return;
    submitting = true;

    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      alert("会員QRを読み取ってください");
      submitting = false;
      return;
    }

    try{
      completeDetail.innerHTML =
        "<span class='complete-title'>✅ 受付完了</span><br><br>" +
        "会員番号：<b>" + escapeHtml(currentMember) + "</b><br>" +
        "クラス：<b>" + escapeHtml(className) + "</b>";

      complete.style.display = "flex";

      const url =
        APP_CONFIG.FORM_RESPONSE +
        "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(currentMember) +
        "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

      await fetch(url, { method:"POST", mode:"no-cors" });

      setTimeout(() => {
        complete.style.display = "none";
        openScanner();
        submitting = false;
      }, 1200);

    }catch(e){
      console.log("submit error", e);
      alert("送信エラー");
      submitting = false;
    }
  }

  /* =====================
     クラス描画
  ===================== */

  async function renderClassButtons(){
    container.innerHTML = "";
    infoBox.innerHTML = "";

    const currentMember = normalizeMember(window.currentMember);

    if(!currentMember){
      infoBox.innerHTML = "会員QRを読み取ってください";
      return;
    }

    infoBox.innerHTML = "受付済み確認中…";

    let duplicateSet = new Set();
    try{
      duplicateSet = await getTodayDuplicateClassSet(currentMember, true);
    }catch(e){
      console.log("duplicateSet error", e);
    }

    let duplicateCount = 0;

    CLASS_LIST.forEach(className => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "class-btn";

      const isDuplicate = duplicateSet.has(className);

      if(isDuplicate){
        btn.textContent = "受付 ▶ " + className + "（受付済み）";
        btn.disabled = true;
        duplicateCount++;
      }else{
        btn.textContent = "受付 ▶ " + className;
        btn.disabled = false;

        btn.onclick = async () => {
          try{
            const duplicate = await checkDuplicate(currentMember, className);

            if(duplicate){
              await renderClassButtons();
              alert("このクラスは本日すでに受付済みです");
              return;
            }

            await submit(className);

          }catch(e){
            console.log("class submit error", e);
            alert("受付エラー");
          }
        };
      }

      container.appendChild(btn);
    });

    if(duplicateCount > 0){
      infoBox.innerHTML =
        "<span style='color:#666;font-weight:700;'>グレー表示のクラスは本日受付済みです</span>";
    }else{
      infoBox.innerHTML = "";
    }
  }

  function renderAll(){
    renderHeader();
    renderClassButtons();
  }

  renderAll();

})();
</script>
</body>
</html>
