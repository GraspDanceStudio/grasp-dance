<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>受付（固定クラス：SAORI）</title>

<script src="./shared.js?v=20260418-8"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; padding: 12px; }

.input-box { margin: 10px 0 14px; }
input[type="text"]{
  font-size: 28px;
  padding: 18px;
  width: 100%;
  box-sizing: border-box;
}

.day-btn {
  font-size: 24px;
  padding: 14px 20px;
  margin: 6px 4px;
  opacity: 0.6;
}
.day-btn.today {
  opacity: 1;
  background: #66adff;
  color: #fff;
  font-weight: bold;
}

.class-btn {
  font-size: 32px;
  padding: 60px 28px;
  margin: 18px 0;
  width: 100%;
  text-align: left;
}

#complete {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
#completeBox {
  background: #fff;
  padding: 44px 34px;
  border-radius: 18px;
  text-align: center;
  width: 92%;
  max-width: 560px;
}
#completeBox .done {
  font-size: 44px;
  font-weight: 800;
  margin-bottom: 12px;
}
#completeBox .detail {
  font-size: 24px;
  line-height: 1.6;
}
</style>
</head>

<body>
<h2 id="title">SAORI受付：QRまたは会員番号を入力してください</h2>

<div class="input-box">
  <input id="memberInput" type="text" placeholder="会員番号 または QRのURL"/>
</div>

<button id="goBtn" class="class-btn" style="text-align:center;">
  受付する（SAORI）
</button>

<div id="complete">
  <div id="completeBox">
    <div class="done">✅ 受付完了</div>
    <div class="detail" id="completeDetail"></div>
  </div>
</div>

<script>
const FIXED_CLASS = "SAORI";

const title = document.getElementById("title");
const memberInput = document.getElementById("memberInput");
const goBtn = document.getElementById("goBtn");
const complete = document.getElementById("complete");
const completeDetail = document.getElementById("completeDetail");

let currentMember = "";
let submitting = false;

// URL対応つきの安全版
function normalizeMemberSafe(v){
  try{
    if(typeof normalizeMember === "function"){
      return normalizeMember(v);
    }
  }catch(e){}

  let s = String(v || "").trim();

  try{
    if(/^https?:/i.test(s)){
      const u = new URL(s);
      s = u.searchParams.get("member") || s;
    }
  }catch(e){}

  try{
    s = decodeURIComponent(s);
  }catch(e){}

  s = s.split("?")[0].trim();

  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
  );

  s = s.replace(/[^A-Za-z0-9\-_]/g, "");
  s = s.toUpperCase();

  return s;
}

function escapeHtmlSafe(v){
  try{
    if(typeof escapeHtml === "function"){
      return escapeHtml(v);
    }
  }catch(e){}
  return String(v || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// 入力中の見た目は壊さず、全角だけ半角化
memberInput.addEventListener("input", () => {
  let v = memberInput.value;

  v = v.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );

  memberInput.value = v;
});

memberInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    goBtn.click();
  }
});

function focusInput(){
  setTimeout(() => memberInput.focus(), 50);
}

function resetForm(){
  currentMember = "";
  window.currentMember = "";
  submitting = false;
  memberInput.value = "";
  focusInput();
}

async function submit(classNames){

  if(submitting) return;
  submitting = true;

  const member = normalizeMemberSafe(window.currentMember);
  const classes = Array.isArray(classNames) ? classNames : [classNames];

  if(!member){
    alert("会員番号が取得できませんでした");
    submitting = false;
    focusInput();
    return;
  }

  try{
    const requests = classes.map(className => {
      const url =
        APP_CONFIG.FORM_RESPONSE +
        "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(member) +
        "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

      return fetch(url, { method: "POST", mode: "no-cors" })
        .catch(e => console.log("submit fetch error", e));
    });

    await Promise.all(requests);

    completeDetail.innerHTML =
      "会員番号：<b>" + escapeHtmlSafe(member) + "</b><br>" +
      "クラス：<b>" + classes.map(c => escapeHtmlSafe(c)).join("<br>") + "</b><br><br>" +
      "次の会員を入力してください";

    complete.style.display = "flex";

    setTimeout(() => {
      complete.style.display = "none";
      resetForm();
    }, 1200);

  }catch(e){
    console.log("submit error", e);
    alert("送信エラー");
    submitting = false;
    focusInput();
  }
}

goBtn.onclick = async () => {
  const v = normalizeMemberSafe(memberInput.value);

  if (!v) {
    alert("会員番号を入力してください");
    focusInput();
    return;
  }

  currentMember = v;
  window.currentMember = v;

  await submit([FIXED_CLASS]);
};

(async () => {
  try{
    await initLiffSafe();
  }catch(e){}
  resetForm();
})();
</script>

</body>
</html>
