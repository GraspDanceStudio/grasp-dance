<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* カード本体 */
.card {
  width: 90%;
  max-width: 380px;
  background: white;
  border-radius: 20px;
  padding: 24px 20px 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

/* タイトル */
.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 12px;
  color: #666;
}

/* 名前 */
.name {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 6px;
}

/* 会員番号 */
.number {
  font-size: 16px;
  color: #666;
  margin-bottom: 18px;
}

/* QR */
#qrcode {
  margin: 0 auto 18px;
}

/* 補足 */
.note {
  font-size: 13px;
  color: #888;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">MEMBER CARD</div>

  <div id="memberName" class="name"></div>
  <div id="memberNumber" class="number"></div>

  <div id="qrcode"></div>

  <div class="note">
    受付時にこのQRコードをご提示ください<br>
    スクリーンショットでも利用可能です
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = params.get("name") || "";

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QRの中身（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成
QRCode.toCanvas(qrText, { width: 220 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
