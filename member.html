<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* カード */
.card {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  box-sizing: border-box;
  padding: 20px 16px 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
}

/* 上エリア */
.top {
  margin-top: 10px;
}

.title {
  font-size: 16px;
  color: #888;
  margin-bottom: 6px;
}

.name {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.number {
  font-size: 16px;
  color: #666;
}

/* QR */
.qr-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#qrcode canvas {
  width: 85vw !important;
  max-width: 320px;
  height: auto !important;
}

/* 下エリア */
.note {
  font-size: 13px;
  color: #777;
  line-height: 1.5;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <div class="title">MEMBER CARD</div>
    <div id="memberName" class="name"></div>
    <div id="memberNumber" class="number"></div>
  </div>

  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>

  <div class="note">
    受付時にQRコードをご提示ください<br>
    スクリーンショットでも利用可能です
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = decodeURIComponent(params.get("name") || "");

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QRの中身（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成（大きめ）
QRCode.toCanvas(qrText, { width: 320 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
