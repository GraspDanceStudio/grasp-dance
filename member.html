<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;

  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url('グラスプ.jpg') center/cover no-repeat;
}

/* 全体 */
.wrapper {
  width: 96%;
  max-width: 460px;
  position: relative;
  z-index: 1;
}

/* カード共通 */
.card {
  background: rgba(20, 24, 30, 0.6);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 22px;
  padding: 28px 24px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
}

/* 上カード */
.top-card {
  margin-bottom: 18px;
  text-align: center;
  padding: 32px 24px;
}

.studio {
  font-size: 14px;
  color: rgba(255,255,255,0.78);
  margin-bottom: 10px;
  line-height: 1.5;
  letter-spacing: 0.5px;
}

.name {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.35);
}

.number {
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  letter-spacing: 1px;
}

/* 下カード */
.qr-card {
  text-align: center;
  padding: 32px 24px;
}

#qrcode {
  margin-bottom: 14px;
}

#qrcode canvas {
  width: 300px !important;
  height: auto !important;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

.note {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  line-height: 1.6;
}

/* スマホ */
@media (max-width: 480px) {
  .wrapper {
    width: 96%;
  }

  .name {
    font-size: 28px;
  }

  #qrcode canvas {
    width: 280px !important;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card top-card">
    <div class="studio">
      GRASP＆K×G DANCE STUDIO<br>
      members card
    </div>

    <div id="memberName" class="name"></div>
    <div id="memberNumber" class="number"></div>
  </div>

  <div class="card qr-card">
    <div id="qrcode"></div>

    <div class="note">
      受付時にQRコードをご提示ください<br>
      スクリーンショットでも利用可能です
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = decodeURIComponent(params.get("name") || "");

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QR（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成
QRCode.toCanvas(qrText, { width: 340 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
