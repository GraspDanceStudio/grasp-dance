<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f3f4f6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* カード */
.card {
  width: 94%;
  max-width: 420px;
  background: white;
  border-radius: 22px;
  padding: 28px 20px 26px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  text-align: center;
}

/* タイトル */
.title {
  font-size: 18px;
  font-weight: 700;
  color: #777;
  margin-bottom: 12px;
}

/* 名前 */
.name {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

/* 会員番号 */
.number {
  font-size: 16px;
  color: #666;
  margin-bottom: 20px;
}

/* QR */
#qrcode {
  margin: 0 auto 20px;
}

/* QRサイズ強制 */
#qrcode canvas {
  width: 260px !important;
  height: auto !important;
}

/* 補足 */
.note {
  font-size: 13px;
  color: #777;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">MEMBER CARD</div>

  <div id="memberName" class="name"></div>
  <div id="memberNumber" class="number"></div>

  <div id="qrcode"></div>

  <div class="note">
    受付時にQRコードをご提示ください<br>
    スクリーンショットでも利用可能です
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = decodeURIComponent(params.get("name") || "");

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QR（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成（少し大きめ）
QRCode.toCanvas(qrText, { width: 300 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
