<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('グラスプ.jpg') center/cover no-repeat;
}

.wrapper {
  width: 100%;
  max-width: 640px;
  padding: 14px;
}

.card {
  background: rgba(20, 24, 30, 0.65);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 28px;
  padding: 42px 34px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #fff;
}

.top-card {
  margin-bottom: 18px;
  text-align: center;
}

.studio {
  font-size: 20px;
  color: rgba(255,255,255,0.8);
  margin-bottom: 16px;
  line-height: 1.6;
}

.name {
  font-size: 44px;
  font-weight: 900;
  margin-bottom: 14px;
}

.number {
  font-size: 22px;
  color: rgba(255,255,255,0.85);
}

.count-card {
  margin-bottom: 18px;
  text-align: center;
  padding: 30px 28px;
}

.count-title {
  font-size: 20px;
  color: rgba(255,255,255,0.82);
  margin-bottom: 10px;
}

.count-main {
  font-size: 42px;
  font-weight: 900;
  margin-bottom: 8px;
}

.count-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.82);
}

.count-error {
  font-size: 18px;
  color: rgba(255,220,220,0.95);
}

.qr-card {
  text-align: center;
}

#qrcode {
  margin-bottom: 18px;
}

#qrcode canvas {
  width: 400px !important;
  height: auto !important;
  background: #fff;
  padding: 14px;
  border-radius: 14px;
}

.note {
  font-size: 17px;
  color: rgba(255,255,255,0.85);
  line-height: 1.7;
  margin-bottom: 24px;
}

.switch-btn {
  width: 100%;
  border: none;
  border-radius: 20px;
  padding: 24px;
  background: rgba(255,255,255,0.95);
  color: #111;
  font-size: 34px;
  font-weight: 900;
  cursor: pointer;
}

@media (max-width: 480px) {
  .wrapper {
    padding: 8px;
  }

  .card {
    padding: 32px 22px;
  }

  .studio {
    font-size: 17px;
  }

  .name {
    font-size: 34px;
  }

  .number {
    font-size: 18px;
  }

  .count-card {
    padding: 28px 22px;
  }

  .count-title {
    font-size: 18px;
  }

  .count-main {
    font-size: 34px;
  }

  .count-sub {
    font-size: 16px;
  }

  .note {
    font-size: 15px;
  }

  .switch-btn {
    font-size: 28px;
    padding: 22px;
  }

  #qrcode canvas {
    width: 320px !important;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card top-card">
    <div class="studio">
      GRASP＆K×G DANCE STUDIO<br>
      members card
    </div>

    <div id="memberName" class="name"></div>
    <div id="memberNumber" class="number"></div>
  </div>

  <div class="card count-card">
    <div class="count-title">今月の受講数</div>
    <div id="countMain" class="count-main">照会中…</div>
    <div id="countSub" class="count-sub"></div>
  </div>

  <div class="card qr-card">
    <div id="qrcode"></div>

    <div class="note">
      受付時にQRコードをご提示ください<br>
      スクリーンショットでも利用可能です
    </div>

    <button class="switch-btn" onclick="switchMember()">
      会員切替・追加
    </button>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyDXdx9X52sngmExXxSpn7BbcWRRTLfUvZMsjXsvQa8psm9nD2XBHuAAVv5ovrwVhoy/exec";

const params = new URLSearchParams(window.location.search);

const member = normalizeMemberNumber(params.get("member") || "");
const name = params.get("name") || "";

document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

QRCode.toCanvas(qrText, { width: 400 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});

loadCount();

function normalizeMemberNumber(value) {
  return String(value || "")
    .trim()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
      return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
    })
    .replace(/[－ー―]/g, "-")
    .replace(/\s+/g, "")
    .toUpperCase();
}

function switchMember() {
  location.href = "cards.html?manage=1";
}

function loadCount() {
  const countMain = document.getElementById("countMain");
  const countSub = document.getElementById("countSub");

  if (!member) {
    countMain.textContent = "-";
    countSub.textContent = "会員番号が取得できませんでした";
    return;
  }

  const callbackName =
    "lessonCountCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

  const script = document.createElement("script");

  const timeoutId = setTimeout(function() {
    cleanupJsonp(callbackName, script);
    countMain.textContent = "-";
    countSub.innerHTML = "<span class='count-error'>受講数を取得できませんでした</span>";
  }, 10000);

  window[callbackName] = function(result) {
    clearTimeout(timeoutId);
    cleanupJsonp(callbackName, script);

    if (!result || !result.ok || typeof result.count === "undefined") {
      countMain.textContent = "-";
      countSub.innerHTML = "<span class='count-error'>受講数を取得できませんでした</span>";
      return;
    }

    countMain.textContent = String(result.count || 0) + " 回";

    if (result.lastDate) {
      countSub.textContent = "最終受講：" + result.lastDate;
    } else if (result.last) {
      countSub.textContent = "最終受講：" + result.last;
    } else {
      countSub.textContent = "今月の受講記録はまだありません";
    }
  };

  script.src =
    GAS_URL +
    "?action=count" +
    "&member=" +
    encodeURIComponent(member) +
    "&callback=" +
    encodeURIComponent(callbackName) +
    "&t=" +
    Date.now();

  script.onerror = function() {
    clearTimeout(timeoutId);
    cleanupJsonp(callbackName, script);
    countMain.textContent = "-";
    countSub.innerHTML = "<span class='count-error'>受講数を取得できませんでした</span>";
  };

  document.body.appendChild(script);
}

function cleanupJsonp(callbackName, script) {
  try {
    delete window[callbackName];
  } catch (e) {
    window[callbackName] = undefined;
  }

  if (script && script.parentNode) {
    script.parentNode.removeChild(script);
  }
}
</script>

</body>
</html>
