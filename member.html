<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f1115;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 全体 */
.wrapper {
  width: 92%;
  max-width: 420px;
}

/* カード共通 */
.card {
  background: linear-gradient(145deg, #1a1d24, #111318);
  border-radius: 22px;
  padding: 24px 20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  color: #fff;
}

/* 上カード */
.top-card {
  margin-bottom: 18px;
  text-align: center;
}

.studio {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 8px;
  line-height: 1.4;
}

.name {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 6px;
}

.number {
  font-size: 14px;
  color: #bbb;
}

/* 下カード */
.qr-card {
  text-align: center;
  padding: 28px 20px;
}

#qrcode canvas {
  width: 260px !important;
  height: auto !important;
  margin-bottom: 14px;
}

.note {
  font-size: 12px;
  color: #aaa;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- 上カード -->
  <div class="card top-card">
    <div class="studio">
      GRASP＆K×G DANCE STUDIO<br>
      members card
    </div>

    <div id="memberName" class="name"></div>
    <div id="memberNumber" class="number"></div>
  </div>

  <!-- 下カード -->
  <div class="card qr-card">
    <div id="qrcode"></div>

    <div class="note">
      受付時にQRコードをご提示ください<br>
      スクリーンショットでも利用可能です
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = decodeURIComponent(params.get("name") || "");

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QR（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成
QRCode.toCanvas(qrText, { width: 300 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
