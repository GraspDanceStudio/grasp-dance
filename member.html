<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会員証</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('グラスプ.jpg') center/cover no-repeat;
}

/* 全体 */
.wrapper {
  width: 100%;
  max-width: 560px; /* ← 大きく */
  padding: 10px;
}

/* カード共通 */
.card {
  background: rgba(20, 24, 30, 0.65);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 24px;
  padding: 36px 28px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #fff;
}

/* 上カード */
.top-card {
  margin-bottom: 20px;
  text-align: center;
}

.studio {
  font-size: 16px;
  color: rgba(255,255,255,0.8);
  margin-bottom: 12px;
  line-height: 1.6;
}

.name {
  font-size: 36px; /* ← かなり大きく */
  font-weight: 900;
  margin-bottom: 10px;
}

.number {
  font-size: 16px;
  color: rgba(255,255,255,0.85);
}

/* 下カード */
.qr-card {
  text-align: center;
}

#qrcode {
  margin-bottom: 16px;
}

/* QR爆上げ */
#qrcode canvas {
  width: 360px !important;
  height: auto !important;
  background: #fff;
  padding: 12px;
  border-radius: 12px;
}

/* 補足 */
.note {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
}

/* スマホ */
@media (max-width: 480px) {
  .wrapper {
    padding: 6px;
  }

  .card {
    padding: 28px 20px;
  }

  .name {
    font-size: 30px;
  }

  #qrcode canvas {
    width: 300px !important;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card top-card">
    <div class="studio">
      GRASP＆K×G DANCE STUDIO<br>
      members card
    </div>

    <div id="memberName" class="name"></div>
    <div id="memberNumber" class="number"></div>
  </div>

  <div class="card qr-card">
    <div id="qrcode"></div>

    <div class="note">
      受付時にQRコードをご提示ください<br>
      スクリーンショットでも利用可能です
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const member = params.get("member") || "";
const name = decodeURIComponent(params.get("name") || "");

// 表示
document.getElementById("memberName").textContent = name || "GUEST";
document.getElementById("memberNumber").textContent = member;

// QR（LIFF）
const qrText =
  "https://liff.line.me/2008912129-TQRCpL9d?member=" +
  encodeURIComponent(member);

// QR生成（最大寄り）
QRCode.toCanvas(qrText, { width: 400 }, function (err, canvas) {
  if (!err) {
    document.getElementById("qrcode").appendChild(canvas);
  }
});
</script>

</body>
</html>
