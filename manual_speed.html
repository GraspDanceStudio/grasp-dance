<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>受付（曜日切替・自動送信）</title>

<script src="./shared.js?v=20260421-2"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 12px;
  max-width: 1100px;
  margin: 0 auto;
}

.page-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
}

.current-class-box {
  font-size: 24px;
  font-weight: 800;
  line-height: 1.5;
  margin-bottom: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  background: #f3f3f3;
}

.current-class-box.active {
  background: #e8f2ff;
  color: #114b9b;
}

.input-box {
  margin: 10px 0 14px;
}

input[type="text"]{
  font-size: 22px;
  padding: 14px 16px;
  width: 100%;
  box-sizing: border-box;
}

.status-box {
  font-size: 20px;
  font-weight: 700;
  margin: 8px 0 10px;
  line-height: 1.6;
}

.scan-debug-box {
  font-size: 16px;
  line-height: 1.6;
  margin: 0 0 16px;
  padding: 12px 14px;
  border-radius: 10px;
  background: #f7f7f7;
  color: #333;
}

.scan-debug-box b {
  font-weight: 800;
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  margin: 18px 0 10px;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}

.day-btn {
  font-size: 18px;
  padding: 12px 10px;
  border: none;
  border-radius: 10px;
  background: #f0f0f0;
  font-weight: 800;
  cursor: pointer;
}

.day-btn.active {
  background: #66adff;
  color: #fff;
}

.class-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.class-select-btn {
  font-size: 20px;
  padding: 16px 16px;
  width: 100%;
  text-align: left;
  border: none;
  border-radius: 10px;
  background: #f5f5f5;
  font-weight: 800;
  cursor: pointer;
  line-height: 1.4;
}

.class-select-btn.active {
  background: #66adff;
  color: #fff;
}

#complete{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

#completeBox{
  background: #fff;
  padding: 36px 20px;
  border-radius: 18px;
  text-align: center;
  width: 96%;
  max-width: 560px;
  box-sizing: border-box;
  line-height: 1.6;
}

#completeDetail{
  font-size: 24px;
  font-weight: 700;
}

#completeDetail b{
  font-size: 32px;
}

.complete-title{
  font-size: 40px;
  font-weight: 800;
  display: block;
}

.helper-text {
  font-size: 16px;
  color: #555;
  line-height: 1.6;
  margin-top: 8px;
}

.meta-row{
  font-size: 16px;
  color: #666;
  margin-bottom: 14px;
}

@media (max-width: 900px){
  .day-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

@media (max-width: 700px){
  .class-grid {
    grid-template-columns: 1fr;
  }

  .day-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
</style>
</head>

<body>

<div class="page-title">受付</div>
<div id="metaRow" class="meta-row"></div>

<div id="currentClassBox" class="current-class-box">
  現在受付中：未選択
</div>

<div class="input-box">
  <input
    id="memberInput"
    type="text"
    placeholder="QRのURL / 会員番号 / 体験番号"
    autocomplete="off"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false"
    inputmode="text"
  />
  <div class="helper-text">
    QRを読むと、この欄に自動入力されてそのまま受付されます。<br>
    直近読取と認識番号を下に表示します。
  </div>
</div>

<div id="statusBox" class="status-box">初期設定中…</div>

<div id="scanDebugBox" class="scan-debug-box">
  直近読取：<b>---</b><br>
  抽出会員番号：<b>---</b>
</div>

<div class="section-title">曜日</div>
<div id="dayGrid" class="day-grid"></div>

<div class="section-title">受付クラス</div>
<div id="classGrid" class="class-grid"></div>

<div id="complete">
  <div id="completeBox">
    <div id="completeDetail"></div>
  </div>
</div>

<script>
(async () => {

  async function sendMonitor(data){
    try{
      console.log("sendMonitor start", data);

      const res = await fetch(
        "https://script.google.com/macros/s/AKfycbyDXdx9X52sngmExXxSpn7BbcWRRTLfUvZMsjXsvQa8psm9nD2XBHuAAVv5ovrwVhoy/exec",
        {
          method: "POST",
          body: JSON.stringify(data)
        }
      );

      console.log("sendMonitor done", res);
    }catch(e){
      console.log("monitor error", e);
    }
  }

  await initLiffSafe();

  const DAY_ORDER = ["月","火","水","木","金","土","WS"];

  const CLASSES_BY_DAY = {
    "月": ["UCCHY初級","UCCHY中級","SHINYA","あすぴ","K×G中村キッズ","K×G中村オープン","K×G長久手"],
    "火": ["SHO-TA","KIBE初級","KIBE中級","MIZUKI","K×G茶屋ヶ坂"],
    "水": ["AIRI初級","AIRI中級","ruchica","K×G高針キッズ","K×G高針オープン"],
    "木": ["SERINAキッズ","SERINA初中級","Shogo","RIN","心","K×G瀬戸"],
    "金": ["manaキッズ","mana初級","KANAMI","RYUYA","SAMURAI"],
    "土": ["幼児","nikoキッズ","SAORI","TAKUEI","愛梨","MAHIRO初級","MAHIRO中級"],
    "WS": ["WS_4/11Cocona練習会","WS_4/18Konoka練習会","WS_4/25Rena練習会"]
  };

  const MIN_VALID_LENGTH = 3;
  const MIN_NUMERIC_MEMBER_LENGTH = 7;
  const DUPLICATE_RESET_MS = 900;
  const COMPLETE_RESET_MS = 1000;
  const INPUT_SETTLE_MS = 800;

  function isMainSchoolClass(name, day){
    const s = String(name || "");
    if(!s) return false;

    if(day !== "WS" && s.startsWith("WS_")) return false;
    if(s.includes("K×G")) return false;

    return true;
  }

  const FILTERED_BY_DAY = {};
  DAY_ORDER.forEach(day => {
    FILTERED_BY_DAY[day] =
      (CLASSES_BY_DAY[day] || []).filter(name =>
        isMainSchoolClass(name, day)
      );
  });

  const metaRow = document.getElementById("metaRow");
  const currentClassBox = document.getElementById("currentClassBox");
  const memberInput = document.getElementById("memberInput");
  const statusBox = document.getElementById("statusBox");
  const scanDebugBox = document.getElementById("scanDebugBox");
  const dayGrid = document.getElementById("dayGrid");
  const classGrid = document.getElementById("classGrid");
  const complete = document.getElementById("complete");
  const completeDetail = document.getElementById("completeDetail");

  let selectedDay = "";
  let selectedClass = "";
  let submitting = false;
  let inputTimer = null;
  let resetTimer = null;
  let lastProcessedMember = "";
  let lastInputSnapshot = "";
  let lastRawForTimer = "";
  let lastHandledRaw = "";

  function setStatus(text){
    statusBox.textContent = text;
  }

  function shortenText(text, max){
    const s = String(text || "");
    if(s.length <= max) return s;
    return s.slice(0, max) + "…";
  }

  function updateScanDebug(raw, member){
    const rawText = raw ? escapeHtml(shortenText(raw, 80)) : "---";
    const memberText = member ? escapeHtml(member) : "---";

    scanDebugBox.innerHTML =
      "直近読取：<b>" + rawText + "</b><br>" +
      "抽出会員番号：<b>" + memberText + "</b>";
  }

  function focusInput(forceSelect = false){
    setTimeout(() => {
      try{
        memberInput.focus({ preventScroll: true });
      }catch(e){
        memberInput.focus();
      }

      if(forceSelect){
        try{
          memberInput.select();
        }catch(e){}
      }
    }, 30);
  }

  function keepInputFocus(){
    window.addEventListener("click", () => {
      if(document.activeElement !== memberInput){
        focusInput(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if(!document.hidden){
        focusInput(false);
      }
    });

    setInterval(() => {
      if(!submitting && document.activeElement !== memberInput){
        focusInput(false);
      }
    }, 1200);
  }

  function displayClassName(className){
    const s = String(className || "");
    if(selectedDay === "WS"){
      return s.replace(/^WS_/, "");
    }
    return s;
  }

  function updateCurrentClassBox(){
    if(selectedClass){
      currentClassBox.classList.add("active");
      currentClassBox.innerHTML =
        "現在受付中：<b>" + escapeHtml(displayClassName(selectedClass)) + "</b>";
    }else{
      currentClassBox.classList.remove("active");
      currentClassBox.innerHTML = "現在受付中：未選択";
    }
  }

  function getTodayDayLabel(){
    try{
      let day = getTokyoWeekdayLabel();
      if(day === "日") day = "月";
      if(!FILTERED_BY_DAY[day]) day = "月";
      return day;
    }catch(e){
      return "月";
    }
  }

  function clearTimers(){
    if(inputTimer){
      clearTimeout(inputTimer);
      inputTimer = null;
    }
    if(resetTimer){
      clearTimeout(resetTimer);
      resetTimer = null;
    }
  }

  function resetInputOnly(){
    clearTimers();
    memberInput.value = "";
    lastInputSnapshot = "";
    lastRawForTimer = "";
    lastHandledRaw = "";
    lastProcessedMember = "";
    focusInput(false);
  }

  function toHalfWidthAscii(str){
    return String(str || "").replace(/[！-～]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
    );
  }

  function normalizeRawInputForUrl(value){
    let s = String(value || "");

    s = toHalfWidthAscii(s);

    const map = {
      "。": ".",
      "、": ",",
      "・": "/",
      "：": ":",
      "；": ";",
      "？": "?",
      "！": "!",
      "＆": "&",
      "＝": "=",
      "＿": "_",
      "－": "-",
      "―": "-",
      "ー": "-",
      "‐": "-",
      "／": "/",
      "＼": "\\",
      "（": "(",
      "）": ")",
      "［": "[",
      "］": "]",
      "｛": "{",
      "｝": "}",
      "　": " ",
      "”": "\"",
      "’": "'",
      "＋": "+",
      "％": "%",
      "＃": "#",
      "｜": "|",
      "〜": "~",
      "ぃ": "l",
      "ね": "n",
      "め": "m",
      "お": "0"
    };

    s = s.replace(/[。、・：；？！＆＝＿－―ー‐／＼（）［］｛｝　”’＋％＃｜〜ぃねめお]/g, ch => map[ch] || ch);
    s = s.replace(/[\r\n\t]/g, "");
    s = s.replace(/\u00A0/g, " ");

    return s.trim();
  }

  function cleanupScanNoise(value){
    let s = String(value || "");

    s = normalizeRawInputForUrl(s);
    s = s.replace(/\s+/g, "");
    s = s.replace(/[<>]/g, "");
    s = s.replace(/^HTTPS?/i, match => match.toLowerCase());
    s = s.replace(/^HTTPSLIFFLINEME/i, "httpslifflineme");
    s = s.replace(/LIFFLINEME/ig, "lifflineme");

    return s;
  }

  function isIncompleteMember(member){
    const m = String(member || "").trim();

    if(!m) return true;

    if(/^\d+$/.test(m)){
      return m.length < MIN_NUMERIC_MEMBER_LENGTH;
    }

    return m.length < MIN_VALID_LENGTH;
  }

  function isKnownBrokenPrefix(raw){
    const s = String(raw || "").toLowerCase();

    // member= が見えているなら正常候補
    if(s.includes("member=")) return false;

    return (
      s === "http" ||
      s === "https" ||
      s === "httpsl" ||
      s === "httpsli" ||
      s === "httpslif" ||
      s === "httpsliff" ||
      s === "httpsliffl" ||
      s === "httpsliffli" ||
      s === "httpslifflin" ||
      s === "httpsliffline" ||
      s === "httpslifflineme" ||
      s === "http://" ||
      s === "https://" ||
      s === "liff" ||
      s === "liffl" ||
      s === "liffli" ||
      s === "lifflin" ||
      s === "liffline" ||
      s === "lifflineme"
    );
  }

  function extractMemberFromRaw(rawValue){
    let raw = cleanupScanNoise(rawValue);
    if(!raw) return "";

    try{
      if(typeof normalizeMember === "function"){
        const libResult = normalizeMember(raw);
        if(libResult && !isIncompleteMember(libResult)){
          return String(libResult).trim();
        }
      }
    }catch(e){}

    let decoded = raw;
    try{
      decoded = decodeURIComponent(raw);
    }catch(e){}

    const candidates = [raw, decoded];

    for(const source0 of candidates){
      let source = String(source0 || "");
      if(!source) continue;

      const lower = source.toLowerCase();

      const m1 = source.match(/[?&]member=([A-Za-z0-9\-_]+)/i);
      if(m1 && m1[1]){
        return String(m1[1]).trim().toUpperCase();
      }

      const m2 = source.match(/member=([A-Za-z0-9\-_]+)/i);
      if(m2 && m2[1]){
        return String(m2[1]).trim().toUpperCase();
      }

      const m3 = source.match(/member[^A-Za-z0-9]{0,5}([A-Za-z0-9\-_]{3,})/i);
      if(m3 && m3[1]){
        return String(m3[1]).trim().toUpperCase();
      }

      const m4 = source.match(/member([A-Za-z0-9\-_]{3,})/i);
      if(m4 && m4[1]){
        return String(m4[1]).trim().toUpperCase();
      }

      const idx = lower.indexOf("member");
      if(idx >= 0){
        const tail = source.slice(idx);
        const m5 = tail.match(/(\d{7,8})(?!.*\d)/);
        if(m5 && m5[1]){
          return m5[1];
        }
      }

      const m6 = source.match(/(\d{7,8})(?!.*\d)/);
      if(m6 && m6[1]){
        return m6[1];
      }

      const onlyNum = source.replace(/\D/g, "");
      if(/^\d{7,8}$/.test(onlyNum)){
        return onlyNum;
      }

      const m7 = source.match(/^[A-Za-z0-9\-_]+$/);
      if(m7){
        const token = source.toUpperCase();
        if(token.length >= MIN_VALID_LENGTH){
          return token;
        }
      }
    }

    return "";
  }

  function isObviouslyInvalidScan(rawValue, member){
    const raw = String(rawValue || "").trim();
    const m = String(member || "").trim();

    if(!raw) return true;
    if(raw.length < MIN_VALID_LENGTH && !m) return true;
    if(/^\d{1,2}$/.test(raw) && !m) return true;

    return false;
  }

  function renderDayButtons(){
    dayGrid.innerHTML = "";

    DAY_ORDER.forEach(day => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "day-btn" + (day === selectedDay ? " active" : "");
      btn.textContent = (day === "WS") ? "WS" : (day + "曜");

      btn.onclick = () => {
        selectedDay = day;
        const list = FILTERED_BY_DAY[selectedDay] || [];
        selectedClass = list[0] || "";
        renderDayButtons();
        renderClassButtons();
        updateCurrentClassBox();
        setStatus("読み取り待機中");
        updateScanDebug("", "");
        resetInputOnly();
      };

      dayGrid.appendChild(btn);
    });
  }

  function renderClassButtons(){
    classGrid.innerHTML = "";

    const classList = FILTERED_BY_DAY[selectedDay] || [];

    classList.forEach(className => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "class-select-btn" + (className === selectedClass ? " active" : "");
      btn.textContent = displayClassName(className);

      btn.onclick = () => {
        selectedClass = className;
        renderClassButtons();
        updateCurrentClassBox();
        setStatus("読み取り待機中");
        updateScanDebug("", "");
        resetInputOnly();
      };

      classGrid.appendChild(btn);
    });
  }

  async function submitFixedClass(member, className){
    const classes = [className];

    if(typeof addLocalPendingClasses === "function"){
      addLocalPendingClasses(member, classes);
    }

    try{
      const url =
        APP_CONFIG.FORM_RESPONSE +
        "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(member) +
        "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

      await fetch(url, { method: "POST", mode: "no-cors" });

      if(typeof promotePendingToConfirmed === "function"){
        promotePendingToConfirmed(member, classes);
      }
    }catch(e){
      if(typeof removeLocalPendingClasses === "function"){
        removeLocalPendingClasses(member, classes);
      }
      throw e;
    }
  }

  function showComplete(member, className){
    completeDetail.innerHTML =
      "<span class='complete-title'>✅ 受付OK</span><br><br>" +
      "会員番号：<b>" + escapeHtml(member) + "</b><br>" +
      "クラス：<b>" + escapeHtml(displayClassName(className)) + "</b>";

    complete.style.display = "flex";
  }

  function hideComplete(){
    complete.style.display = "none";
  }

  async function processReception(rawValue){
    const raw = cleanupScanNoise(rawValue);
    const member = extractMemberFromRaw(raw);

    updateScanDebug(raw, member);

    if(isKnownBrokenPrefix(raw)){
      setStatus("読み取り不完全");
      return;
    }

    if(isObviouslyInvalidScan(raw, member)){
      setStatus("読み取り待機中");
      return;
    }

    if(!member){
      await sendMonitor({
        class: selectedClass,
        raw: rawValue,
        member: "",
        status: "NG",
        message: "読取失敗"
      });

      setStatus("会員番号を抽出できませんでした");
      resetTimer = setTimeout(() => {
        resetInputOnly();
        setStatus("読み取り待機中");
        updateScanDebug("", "");
      }, 900);
      return;
    }

    if(isIncompleteMember(member)){
      setStatus("読み取り不完全");
      return;
    }

    if(!selectedDay){
      setStatus("先に曜日を選択してください");
      return;
    }

    if(!selectedClass){
      setStatus("先にクラスを選択してください");
      return;
    }

    if(submitting) return;
    if(member === lastProcessedMember) return;

    lastProcessedMember = member;
    window.currentMember = member;

    try{
      submitting = true;
      setStatus("受付済み確認中…");

      const duplicate = await checkDuplicate(member, selectedClass, true);

      if(duplicate){
        await sendMonitor({
          class: selectedClass,
          raw: rawValue,
          member: member,
          status: "重複",
          message: "本日受付済み"
        });

        submitting = false;
        setStatus("本日受付済み");
        alert(
          "この会員は本日すでに受付済みです。\n\n" +
          "会員番号： " + member + "\n" +
          "クラス： " + displayClassName(selectedClass)
        );

        resetTimer = setTimeout(() => {
          resetInputOnly();
          setStatus("読み取り待機中");
          updateScanDebug("", "");
        }, DUPLICATE_RESET_MS);

        return;
      }

      setStatus("送信中…");
      showComplete(member, selectedClass);

      await submitFixedClass(member, selectedClass);

      await sendMonitor({
        class: selectedClass,
        raw: rawValue,
        member: member,
        status: "OK",
        message: "受付完了"
      });

      setStatus("受付完了");

      resetTimer = setTimeout(() => {
        hideComplete();
        submitting = false;
        resetInputOnly();
        setStatus("読み取り待機中");
        updateScanDebug("", "");
      }, COMPLETE_RESET_MS);

    }catch(e){
      console.log("processReception error", e);
      hideComplete();
      submitting = false;
      setStatus("受付エラー");
      alert("受付エラー");
      focusInput(false);
    }
  }

  memberInput.addEventListener("input", () => {
    let v = memberInput.value;
    v = cleanupScanNoise(v);
    memberInput.value = v;

    updateScanDebug(v, extractMemberFromRaw(v));

    if(v === lastInputSnapshot){
      return;
    }

    if(v.length < lastInputSnapshot.length){
      lastInputSnapshot = v;
      lastRawForTimer = v;
      if(inputTimer){
        clearTimeout(inputTimer);
        inputTimer = null;
      }
      return;
    }

    lastInputSnapshot = v;
    lastRawForTimer = v;

    if(inputTimer){
      clearTimeout(inputTimer);
    }

    inputTimer = setTimeout(async () => {
      const currentRaw = cleanupScanNoise(memberInput.value);

      if(currentRaw !== lastRawForTimer){
        return;
      }

      if(currentRaw === lastHandledRaw){
        return;
      }

      const currentMember = extractMemberFromRaw(currentRaw);
      updateScanDebug(currentRaw, currentMember);

      if(isKnownBrokenPrefix(currentRaw)){
        setStatus("読み取り不完全");
        return;
      }

      if(!currentMember){
        setStatus("読み取り中…");
        return;
      }

      if(isIncompleteMember(currentMember)){
        setStatus("読み取り不完全");
        return;
      }

      lastHandledRaw = currentRaw;
      await processReception(currentRaw);
    }, INPUT_SETTLE_MS);
  });

  memberInput.addEventListener("keydown", async (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      if(inputTimer){
        clearTimeout(inputTimer);
        inputTimer = null;
      }

      const raw = cleanupScanNoise(memberInput.value);
      const member = extractMemberFromRaw(raw);
      updateScanDebug(raw, member);

      if(isKnownBrokenPrefix(raw)){
        setStatus("読み取り不完全");
        return;
      }

      if(isIncompleteMember(member)){
        setStatus("読み取り不完全");
        return;
      }

      lastHandledRaw = raw;
      await processReception(raw);
    }
  });

  memberInput.addEventListener("blur", () => {
    if(!submitting){
      focusInput(false);
    }
  });

  selectedDay = getTodayDayLabel();
  selectedClass = (FILTERED_BY_DAY[selectedDay] || [])[0] || "";

  metaRow.innerHTML =
    "本日の曜日：<b>" + escapeHtml(selectedDay === "WS" ? "WS" : (selectedDay + "曜")) + "</b> ／ 初期選択：<b>" + escapeHtml(selectedClass ? displayClassName(selectedClass) : "なし") + "</b>";

  renderDayButtons();
  renderClassButtons();
  updateCurrentClassBox();
  updateScanDebug("", "");
  setStatus("読み取り待機中");
  focusInput(false);
  keepInputFocus();

})();
</script>
</body>
</html>
