<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>受付（曜日切替・自動送信）</title>

<script src="./shared.js?v=20260420-5"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 12px;
  max-width: 1100px;
  margin: 0 auto;
}

.page-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
}

.current-class-box {
  font-size: 24px;
  font-weight: 800;
  line-height: 1.5;
  margin-bottom: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  background: #f3f3f3;
}

.current-class-box.active {
  background: #e8f2ff;
  color: #114b9b;
}

.input-box {
  margin: 10px 0 14px;
}

input[type="text"]{
  font-size: 22px;
  padding: 14px 16px;
  width: 100%;
  box-sizing: border-box;
}

.status-box {
  font-size: 20px;
  font-weight: 700;
  margin: 8px 0 16px;
  line-height: 1.6;
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  margin: 18px 0 10px;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}

.day-btn {
  font-size: 18px;
  padding: 12px 10px;
  border: none;
  border-radius: 10px;
  background: #f0f0f0;
  font-weight: 800;
  cursor: pointer;
}

.day-btn.active {
  background: #66adff;
  color: #fff;
}

.class-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.class-select-btn {
  font-size: 20px;
  padding: 16px 16px;
  width: 100%;
  text-align: left;
  border: none;
  border-radius: 10px;
  background: #f5f5f5;
  font-weight: 800;
  cursor: pointer;
  line-height: 1.4;
}

.class-select-btn.active {
  background: #66adff;
  color: #fff;
}

#complete{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

#completeBox{
  background: #fff;
  padding: 36px 20px;
  border-radius: 18px;
  text-align: center;
  width: 96%;
  max-width: 560px;
  box-sizing: border-box;
  line-height: 1.6;
}

#completeDetail{
  font-size: 24px;
  font-weight: 700;
}

#completeDetail b{
  font-size: 32px;
}

.complete-title{
  font-size: 40px;
  font-weight: 800;
  display: block;
}

.helper-text {
  font-size: 16px;
  color: #555;
  line-height: 1.6;
  margin-top: 8px;
}

.meta-row{
  font-size: 16px;
  color: #666;
  margin-bottom: 14px;
}

@media (max-width: 900px){
  .day-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 700px){
  .class-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="page-title">受付</div>
<div id="metaRow" class="meta-row"></div>

<div id="currentClassBox" class="current-class-box">
  現在受付中：未選択
</div>

<div class="input-box">
  <input id="memberInput" type="text" placeholder="QRのURL / 会員番号 / 体験番号" autocomplete="off" autocapitalize="off" />
  <div class="helper-text">
    曜日とクラスを確認してから、QRを読むかURLを貼り付けてください。<br>
    QRリーダー導入後は、この入力欄に自動で入る想定です。
  </div>
</div>

<div id="statusBox" class="status-box">初期設定中…</div>

<div class="section-title">曜日</div>
<div id="dayGrid" class="day-grid"></div>

<div class="section-title">受付クラス</div>
<div id="classGrid" class="class-grid"></div>

<div id="complete">
  <div id="completeBox">
    <div id="completeDetail"></div>
  </div>
</div>

<script>
(async () => {

  await initLiffSafe();

  const DAY_ORDER = ["月","火","水","木","金","土"];

  const CLASSES_BY_DAY = {
    "月": ["UCCHY初級","UCCHY中級","SHINYA","あすぴ","K×G中村キッズ","K×G中村オープン","K×G長久手"],
    "火": ["SHO-TA","KIBE初級","KIBE中級","MIZUKI","K×G茶屋ヶ坂"],
    "水": ["AIRI初級","AIRI中級","ruchica","K×G高針キッズ","K×G高針オープン"],
    "木": ["SERINAキッズ","SERINA初中級","Shogo","RIN","心","K×G瀬戸"],
    "金": ["manaキッズ","mana初級","KANAMI","RYUYA","SAMURAI"],
    "土": ["幼児","nikoキッズ","SAORI","TAKUEI","愛梨","MAHIRO初級","MAHIRO中級"],
    "WS": ["WS_4/11Cocona練習会","WS_4/18Konoka練習会","WS_4/25Rena練習会"]
  };

  function isMainSchoolClass(name){
    const s = String(name || "");
    if(!s) return false;
    if(s.startsWith("WS_")) return false;
    if(s.includes("K×G")) return false;
    return true;
  }

  const FILTERED_BY_DAY = {};
  DAY_ORDER.forEach(day => {
    FILTERED_BY_DAY[day] = (CLASSES_BY_DAY[day] || []).filter(isMainSchoolClass);
  });

  const metaRow = document.getElementById("metaRow");
  const currentClassBox = document.getElementById("currentClassBox");
  const memberInput = document.getElementById("memberInput");
  const statusBox = document.getElementById("statusBox");
  const dayGrid = document.getElementById("dayGrid");
  const classGrid = document.getElementById("classGrid");
  const complete = document.getElementById("complete");
  const completeDetail = document.getElementById("completeDetail");

  let selectedDay = "";
  let selectedClass = "";
  let submitting = false;
  let inputTimer = null;
  let lastProcessedValue = "";
  let resetTimer = null;

  function getTodayDayLabel(){
    try{
      let day = getTokyoWeekdayLabel();
      if(day === "日") day = "月";
      if(!FILTERED_BY_DAY[day]) day = "月";
      return day;
    }catch(e){
      return "月";
    }
  }

  function setStatus(text){
    statusBox.textContent = text;
  }

  function focusInput(){
    setTimeout(() => memberInput.focus(), 50);
  }

  function updateCurrentClassBox(){
    if(selectedClass){
      currentClassBox.classList.add("active");
      currentClassBox.innerHTML =
        "現在受付中：<b>" + escapeHtml(selectedClass) + "</b>";
    }else{
      currentClassBox.classList.remove("active");
      currentClassBox.innerHTML = "現在受付中：未選択";
    }
  }

  // 全角英数を半角へ
  function toHalfWidthAscii(str){
    return String(str || "").replace(/[！-～]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
    );
  }

  // URLっぽい日本語混じり入力をASCII寄りに直す
  function normalizeRawInputForUrl(value){
    let s = String(value || "");

    s = toHalfWidthAscii(s);

    const map = {
      "。": ".",
      "、": ",",
      "・": "/",
      "：": ":",
      "？": "?",
      "＝": "=",
      "＿": "_",
      "－": "-",
      "／": "/",
      "　": " ",
      "ぃ": "l",
      "ね": "n",
      "め": "m"
    };

    s = s.replace(/[。、・：？＝＿－／　ぃねめ]/g, ch => map[ch] || ch);

    return s;
  }

  function normalizeMemberSafe(v){
    try{
      if(typeof normalizeMember === "function"){
        return normalizeMember(v);
      }
    }catch(e){}

    let s = String(v || "").trim();
    s = normalizeRawInputForUrl(s);

    try{
      if(/^https?:/i.test(s)){
        const u = new URL(s);
        s = u.searchParams.get("member") || s;
      }
    }catch(e){}

    try{
      s = decodeURIComponent(s);
    }catch(e){}

    s = s.split("?")[0].trim();
    s = toHalfWidthAscii(s);
    s = s.replace(/[^A-Za-z0-9\-_]/g, "");
    s = s.toUpperCase();

    return s;
  }

  function resetInputOnly(){
    if(resetTimer){
      clearTimeout(resetTimer);
      resetTimer = null;
    }

    memberInput.value = "";
    lastProcessedValue = "";
    focusInput();
  }

  function renderDayButtons(){
    dayGrid.innerHTML = "";

    DAY_ORDER.forEach(day => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "day-btn" + (day === selectedDay ? " active" : "");
      btn.textContent = day + "曜";

      btn.onclick = () => {
        selectedDay = day;
        const list = FILTERED_BY_DAY[selectedDay] || [];
        selectedClass = list[0] || "";
        renderDayButtons();
        renderClassButtons();
        updateCurrentClassBox();
        setStatus("読み取り待機中");
        resetInputOnly();
      };

      dayGrid.appendChild(btn);
    });
  }

  function renderClassButtons(){
    classGrid.innerHTML = "";

    const classList = FILTERED_BY_DAY[selectedDay] || [];

    classList.forEach(className => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "class-select-btn" + (className === selectedClass ? " active" : "");
      btn.textContent = className;

      btn.onclick = () => {
        selectedClass = className;
        renderClassButtons();
        updateCurrentClassBox();
        setStatus("読み取り待機中");
        resetInputOnly();
      };

      classGrid.appendChild(btn);
    });
  }

  async function submitFixedClass(member, className){
    if(submitting) return;
    submitting = true;

    try{
      completeDetail.innerHTML =
        "<span class='complete-title'>✅ 受付完了</span><br><br>" +
        "会員番号：<b>" + escapeHtml(member) + "</b><br>" +
        "クラス：<b>" + escapeHtml(className) + "</b>";

      complete.style.display = "flex";

      const url =
        APP_CONFIG.FORM_RESPONSE +
        "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(member) +
        "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

      await fetch(url, { method:"POST", mode:"no-cors" });

      setStatus("受付完了");

      resetTimer = setTimeout(() => {
        complete.style.display = "none";
        submitting = false;
        resetInputOnly();
        setStatus("読み取り待機中");
      }, 1000);

    }catch(e){
      console.log("submitFixedClass error", e);
      complete.style.display = "none";
      alert("送信エラー");
      submitting = false;
      setStatus("送信エラー");
      focusInput();
    }
  }

  async function processReception(rawValue){
    const member = normalizeMemberSafe(rawValue);

    if(!member) return;
    if(!selectedDay){
      setStatus("先に曜日を選択してください");
      return;
    }
    if(!selectedClass){
      setStatus("先にクラスを選択してください");
      return;
    }
    if(submitting) return;
    if(member === lastProcessedValue) return;

    lastProcessedValue = member;
    window.currentMember = member;

    try{
      setStatus("受付済み確認中…");

      const duplicate = await checkDuplicate(member, selectedClass);

      if(duplicate){
        setStatus("本日受付済み");
        alert(
          "この会員は本日すでに受付済みです。\n\n" +
          "会員番号： " + member + "\n" +
          "クラス： " + selectedClass
        );

        resetTimer = setTimeout(() => {
          resetInputOnly();
          setStatus("読み取り待機中");
        }, 700);

        return;
      }

      setStatus("送信中…");
      await submitFixedClass(member, selectedClass);

    }catch(e){
      console.log("processReception error", e);
      alert("受付エラー");
      submitting = false;
      setStatus("受付エラー");
      focusInput();
    }
  }

  memberInput.addEventListener("input", () => {
    let v = memberInput.value;

    v = normalizeRawInputForUrl(v);
    memberInput.value = v;

    if(inputTimer){
      clearTimeout(inputTimer);
    }

    inputTimer = setTimeout(async () => {
      await processReception(memberInput.value);
    }, 250);
  });

  memberInput.addEventListener("keydown", async (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      if(inputTimer){
        clearTimeout(inputTimer);
      }
      await processReception(memberInput.value);
    }
  });

  selectedDay = getTodayDayLabel();
  selectedClass = (FILTERED_BY_DAY[selectedDay] || [])[0] || "";

  metaRow.innerHTML =
    "本日の曜日：<b>" + escapeHtml(selectedDay) + "曜</b> ／ 初期選択：<b>" + escapeHtml(selectedClass || "なし") + "</b>";

  renderDayButtons();
  renderClassButtons();
  updateCurrentClassBox();
  setStatus("読み取り待機中");
  focusInput();

})();
</script>
</body>
</html>
