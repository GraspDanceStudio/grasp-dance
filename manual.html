<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>受付（手入力）</title>

<script src="./shared.js?v=20260428-1"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; padding: 12px; }

.input-box { margin: 10px 0 14px; }
input[type="text"]{
  font-size: 28px;
  padding: 18px;
  width: 100%;
  box-sizing: border-box;
}

.day-btn {
  font-size: 24px;
  padding: 14px 20px;
  margin: 6px 4px;
  opacity: 0.6;
}
.day-btn.today {
  opacity: 1;
  background: #66adff;
  color: #fff;
  font-weight: bold;
}

.class-btn {
  font-size: 32px;
  padding: 60px 28px;
  margin: 18px 0;
  width: 100%;
  text-align: left;
}

#complete {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
#completeBox {
  background: #fff;
  padding: 44px 34px;
  border-radius: 18px;
  text-align: center;
  width: 92%;
  max-width: 560px;
}
#completeBox .done {
  font-size: 44px;
  font-weight: 800;
  margin-bottom: 12px;
}
#completeBox .detail {
  font-size: 24px;
  line-height: 1.6;
}

.section { display: none; }
.section.active { display: block; }
</style>
</head>

<body>
<h2 id="title">会員番号を入力してください</h2>

<div id="sectionInput" class="section active">
  <div class="input-box">
    <input id="memberInput" type="text" placeholder="会員番号"/>
  </div>
  <button id="goBtn" class="class-btn" style="text-align:center;">
    次へ（クラス選択）
  </button>
</div>

<div id="sectionSelect" class="section">
  <div id="dayButtons"></div>
  <div id="container"></div>
  <button id="backBtn" class="day-btn" style="margin-top:10px;">
    ← 会員番号入力に戻る
  </button>
</div>

<div id="complete">
  <div id="completeBox">
    <div class="done">✅ 受付完了</div>
    <div class="detail" id="completeDetail"></div>
  </div>
</div>

<script>
const title = document.getElementById("title");
const memberInput = document.getElementById("memberInput");
const goBtn = document.getElementById("goBtn");
const backBtn = document.getElementById("backBtn");
const dayButtons = document.getElementById("dayButtons");
const container = document.getElementById("container");
const complete = document.getElementById("complete");
const completeDetail = document.getElementById("completeDetail");
const sectionInput = document.getElementById("sectionInput");
const sectionSelect = document.getElementById("sectionSelect");

let currentMember = "";
let submitting = false;
let selectedDay = "";

function normalizeMemberSafe(v){
  try{
    if(typeof normalizeMember === "function"){
      return normalizeMember(v);
    }
  }catch(e){}
  return String(v || "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[^A-Za-z0-9\-_]/g, "")
    .toUpperCase()
    .trim();
}

function escapeHtmlSafe(v){
  try{
    if(typeof escapeHtml === "function"){
      return escapeHtml(v);
    }
  }catch(e){}
  return String(v || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

memberInput.addEventListener("input", () => {
  let v = memberInput.value;

  v = v.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );

  v = v.replace(/[^A-Za-z0-9\-_]/g, "");
  v = v.toUpperCase();

  memberInput.value = v;
});

memberInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    goBtn.click();
  }
});

function showInputScreen() {
  sectionSelect.classList.remove("active");
  sectionInput.classList.add("active");
  title.textContent = "会員番号を入力してください";
  currentMember = "";
  submitting = false;
  memberInput.value = "";
  setTimeout(() => memberInput.focus(), 50);
}

function showSelectScreen() {
  sectionInput.classList.remove("active");
  sectionSelect.classList.add("active");

  if (!selectedDay) {
    try{
      selectedDay = getTokyoWeekdayLabel();
    }catch(e){
      selectedDay = "月";
    }
    if (selectedDay === "日") selectedDay = "土";
  }

  renderAll();
}

async function submit(classNames){

  if(submitting) return;
  submitting = true;

  const member = normalizeMemberSafe(window.currentMember);
  const classes = Array.isArray(classNames) ? classNames : [classNames];

  const requests = classes.map(className => {
    const url =
      APP_CONFIG.FORM_RESPONSE +
      "?" + APP_CONFIG.ENTRY_MEMBER + "=" + encodeURIComponent(member) +
      "&" + APP_CONFIG.ENTRY_CLASS + "=" + encodeURIComponent(className);

    return fetch(url, { method: "POST", mode: "no-cors" })
      .catch(e => console.log("submit fetch error", e));
  });

  await Promise.all(requests);

  completeDetail.innerHTML =
    "会員番号：<b>" + escapeHtmlSafe(member) + "</b><br>" +
    "クラス：<b>" + classes.map(c => escapeHtmlSafe(c)).join("<br>") + "</b><br><br>" +
    "次の会員を入力してください";

  complete.style.display = "flex";

  setTimeout(() => {
    complete.style.display = "none";
    showInputScreen();
  }, 1200);
}

function renderAll() {
  try{
    renderDayButtons({
      dayButtonsEl: dayButtons,
      selectedDay,
      onSelect: (day) => {
        selectedDay = day;
        renderAll();
      }
    });

    renderClasses({
      day: selectedDay,
      titleEl: title,
      containerEl: container,
      onSubmit: submit
    });
  }catch(e){
    console.log("renderAll error", e);
    alert("画面表示エラー");
  }
}

goBtn.onclick = () => {
  const v = normalizeMemberSafe(memberInput.value);

  if (!v) {
    alert("会員番号を入力してください");
    return;
  }

  currentMember = v;
  window.currentMember = v;
  showSelectScreen();
};

backBtn.onclick = () => showInputScreen();

(async () => {
  try{
    await initLiffSafe();
  }catch(e){}
  showInputScreen();
})();
</script>

</body>
</html>
